version = 1
requires-python = ">=3.10"

[[package]]
name = "email-triage-env"
version = "1.0.0"
source = { editable = "." }
dependencies = [
  { name = "fastapi" },
  { name = "uvicorn", extra = ["standard"] },
  { name = "pydantic" },
  { name = "httpx" },
  { name = "openai" },
  { name = "requests" },
  { name = "openenv-core" },
]

[package.metadata]
requires-dist = [
  { name = "fastapi", specifier = ">=0.110.0" },
  { name = "uvicorn", extras = ["standard"], specifier = ">=0.29.0" },
  { name = "pydantic", specifier = ">=2.6.0" },
  { name = "httpx", specifier = ">=0.27.0" },
  { name = "openai", specifier = ">=1.25.0" },
  { name = "requests", specifier = ">=2.31.0" },
  { name = "openenv-core", specifier = ">=0.2.0" },
]

[[package]]
name = "fastapi"
version = "0.115.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "uvicorn"
version = "0.29.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "pydantic"
version = "2.7.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "httpx"
version = "0.27.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "openai"
version = "1.35.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "requests"
version = "2.32.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "openenv-core"
version = "0.2.0"
source = { registry = "https://pypi.org/simple" }
